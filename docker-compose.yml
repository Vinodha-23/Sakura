services:
  postgres:
    image: postgres:16-alpine
    container_name: sakura-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sakura
      POSTGRES_PASSWORD: sakura
      POSTGRES_DB: sakura
    volumes:
      - sakura_pg_data:/var/lib/postgresql/data

volumes:
  sakura_pg_data:
